<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой Маркетплейс</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f7; margin: 0; padding: 20px; }
        .header { background: #005bff; color: white; padding: 20px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        #catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .product-card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); }
        .price-tag { font-size: 20px; font-weight: bold; color: #222; margin: 10px 0; }
        .buy-button { background: #005bff; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; width: 100%; }
        .buy-button:hover { background: #0045c7; }
        #cart-count { font-weight: bold; background: white; color: #005bff; padding: 5px 15px; border-radius: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>MarketPlace</h1>
        <div id="cart-count">Корзина: 0</div>
        <button onclick="checkout()" style="cursor:pointer; border-radius: 8px; border: none; padding: 5px 10px;">Оформить</button>
    </div>

    <div id="catalog">
        <p>Загрузка товаров...</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
